name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.90
        components: rustfmt, clippy
    
    - name: Cache cargo dependencies
      uses: Swatinem/rust-cache@v2
      with:
        cache-all-crates: true
    
    - name: Build rag-core
      run: cargo build --package rag-core --release
    
    - name: Test rag-core
      run: cargo test --package rag-core
    
    - name: Build rag-api
      run: cargo build --package rag-api --release
    
    - name: Test rag-api
      run: cargo test --package rag-api
    
    - name: Build rag-indexer
      run: cargo build --package rag-indexer --release
    
    - name: Test rag-indexer
      run: cargo test --package rag-indexer
    
    - name: Build rag-cli
      run: cargo build --package rag-cli --release
    
    - name: Test rag-cli
      run: cargo test --package rag-cli
    
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-llvm-cov
    
    - name: Generate code coverage
      run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: lcov.info
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
